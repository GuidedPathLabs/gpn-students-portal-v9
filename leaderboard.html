<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPN Student Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#07111f;
      --surface:#0f1f35;
      --border:#1e3a5f;
      --text:#e8edf2;
      --heading:#00e5ff;
      --link:#ffd54f;
      --muted:#7a90a8;
      --good:#4dff91;
      --bad:#ff5252;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:0 0 24px;
      min-height:100vh;
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);
      background-size:36px 36px;
      pointer-events:none;
    }

    /* WRAP */
    .wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 8px 32px;}

    /* HEADER */
    .lb-header{
      text-align:center;
      padding:28px 12px 20px;
      position:relative;z-index:1;
    }
    .lb-header .brand{
      font-family:'Rajdhani',sans-serif;
      font-size:0.85rem;color:var(--muted);
      letter-spacing:3px;text-transform:uppercase;
    }
    .lb-header h1{
      font-family:'Rajdhani',sans-serif;
      font-size:1.9rem;font-weight:700;
      color:#ffffff;
      margin-top:6px;
      text-shadow:0 0 24px rgba(0,229,255,0.4);
    }
    .lb-header h1 span{color:var(--heading);}
    .lb-header .subtitle{font-size:0.8rem;color:var(--muted);margin-top:5px;}
    .lb-updated{font-size:0.7rem;color:var(--muted);margin-top:3px;}

    /* PODIUM */
    .podium{
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:6px;
      margin-bottom:26px;
      width:100%;
    }
    .podium-item{flex:1;min-width:0;text-align:center;}
    .podium-card{
      border-radius:14px;
      padding:14px 8px 12px;
      border:1px solid var(--border);
      overflow:hidden;
      transition:transform 0.2s;
    }
    /* 1st place */
    .podium-item.rank1 .podium-card{
      background:linear-gradient(160deg,rgba(255,213,79,0.22),rgba(255,160,0,0.08));
      border-color:rgba(255,213,79,0.6);
      box-shadow:0 0 28px rgba(255,213,79,0.18),inset 0 1px 0 rgba(255,255,255,0.08);
      transform:scale(1.05);
    }
    /* 2nd place */
    .podium-item.rank2 .podium-card{
      background:linear-gradient(160deg,rgba(0,229,255,0.16),rgba(0,180,220,0.05));
      border-color:rgba(0,229,255,0.4);
      box-shadow:0 0 20px rgba(0,229,255,0.12);
    }
    /* 3rd place */
    .podium-item.rank3 .podium-card{
      background:linear-gradient(160deg,rgba(205,127,50,0.18),rgba(180,90,20,0.06));
      border-color:rgba(210,150,60,0.45);
      box-shadow:0 0 16px rgba(205,127,50,0.12);
    }

    .podium-crown{
      font-size:1.9rem;line-height:1;margin-bottom:6px;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,0.7));
    }
    .podium-item.rank1 .podium-crown{font-size:2.4rem;}

    .podium-rank{
      font-family:'Rajdhani',sans-serif;
      font-size:0.6rem;font-weight:700;
      letter-spacing:1px;text-transform:uppercase;
      margin-bottom:5px;white-space:nowrap;
    }
    .podium-item.rank1 .podium-rank{color:#ffd54f;}
    .podium-item.rank2 .podium-rank{color:#00e5ff;}
    .podium-item.rank3 .podium-rank{color:#e8a050;}

    .podium-name{
      font-family:'Rajdhani',sans-serif;
      font-size:0.9rem;font-weight:700;
      color:#ffffff;line-height:1.2;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .podium-item.rank1 .podium-name{font-size:1rem;color:#fff;}

    .podium-school{
      font-size:0.6rem;color:var(--muted);margin-top:3px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .podium-score{
      font-family:'Rajdhani',sans-serif;
      font-size:1.3rem;font-weight:700;margin-top:7px;
    }
    .podium-item.rank1 .podium-score{color:#ffd54f;font-size:1.6rem;}
    .podium-item.rank2 .podium-score{color:#00e5ff;}
    .podium-item.rank3 .podium-score{color:#e8a050;}

    .podium-badges{margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;}
    .pb{
      font-size:0.56rem;padding:2px 5px;border-radius:7px;
      background:rgba(255,255,255,0.1);color:#e8edf2;
      border:1px solid rgba(255,255,255,0.12);
    }

    /* SECTION TITLE */
    .section-title{
      font-family:'Rajdhani',sans-serif;
      font-size:0.78rem;font-weight:700;
      color:var(--heading);
      text-transform:uppercase;letter-spacing:2px;
      margin:22px 0 12px;
      display:flex;align-items:center;gap:8px;
    }
    .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

    /* LIST ROWS */
    .lb-list{display:flex;flex-direction:column;gap:8px;}
    .lb-row{
      display:flex;align-items:center;gap:10px;
      padding:13px 12px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      transition:border-color 0.2s,background 0.2s;
    }
    .lb-row:hover{
      border-color:rgba(0,229,255,0.25);
      background:rgba(0,229,255,0.03);
    }
    .lb-rank-num{
      font-family:'Rajdhani',sans-serif;
      font-size:1.15rem;font-weight:700;
      color:var(--heading);
      min-width:34px;text-align:center;flex-shrink:0;
    }
    .lb-info{flex:1;min-width:0;}
    .lb-name{
      font-size:0.92rem;font-weight:600;
      color:#ffffff;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .lb-school{
      font-size:0.7rem;color:var(--muted);margin-top:2px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .lb-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
    .lb-badge{
      font-size:0.62rem;padding:2px 7px;border-radius:8px;
      background:rgba(255,213,79,0.12);
      color:#ffd54f;
      border:1px solid rgba(255,213,79,0.2);
    }
    .lb-score{
      font-family:'Rajdhani',sans-serif;
      font-size:1.1rem;font-weight:700;
      color:#ffd54f;
      flex-shrink:0;
    }

    /* STATES */
    .empty{text-align:center;padding:36px;color:var(--muted);font-size:0.85rem;}
    .spinner{
      display:inline-block;width:18px;height:18px;
      border:2px solid rgba(0,229,255,0.2);
      border-top-color:var(--heading);
      border-radius:50%;
      animation:spin 0.7s linear infinite;
      vertical-align:middle;margin-right:6px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    /* FOOTER */
    .footer{
      text-align:center;font-size:0.75rem;
      color:var(--muted);margin-top:28px;line-height:1.9;
    }
    .footer strong{color:#e8edf2;}
    .footer a{color:var(--link);text-decoration:none;}

    /* MOBILE FINE-TUNE */
    @media(max-width:400px){
      .podium-crown{font-size:1.5rem;}
      .podium-item.rank1 .podium-crown{font-size:1.9rem;}
      .podium-name{font-size:0.8rem;}
      .podium-item.rank1 .podium-name{font-size:0.88rem;}
      .podium-score{font-size:1.1rem;}
      .podium-item.rank1 .podium-score{font-size:1.35rem;}
      .lb-header h1{font-size:1.55rem;}
    }
  </style>
</head>
<body>

<div class="lb-header">
  <div class="brand">Guided Path Noida</div>
  <h1>🏆 <span>Student</span> Leaderboard</h1>
  <div class="subtitle">Top performers — updated every Wednesday</div>
  <div class="lb-updated" id="lastUpdated"></div>
</div>

<div class="wrap" id="lbWrap">
  <div class="empty"><span class="spinner"></span> Loading leaderboard...</div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzL3Kw6D2k5yU0LFeRI7ch-UQquvJ8EgxknjmcMWjRRRUHeuj92W5QKRBD9rlkj9FTzrQ/exec";

function esc(s){ return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function badgeChips(str){
  if(!str) return '';
  return str.split(',').map(b=>b.trim()).filter(Boolean)
    .map(b=>`<span class="lb-badge">${esc(b)}</span>`).join('');
}
function podiumBadges(str){
  if(!str) return '';
  return str.split(',').map(b=>b.trim()).filter(Boolean)
    .map(b=>`<span class="pb">${esc(b)}</span>`).join('');
}

async function loadLeaderboard(){
  const wrap = document.getElementById('lbWrap');
  try{
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=leaderboard`);
    const json = await res.json();

    if(json.status !== 'success' || !json.leaderboard || !json.leaderboard.length){
      wrap.innerHTML = `<div class="empty">Leaderboard not yet available.<br>Check back after Wednesday! 💪</div>`;
      sendHeight();
      return;
    }

    document.getElementById('lastUpdated').textContent =
      'Last updated: ' + new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});

    const leaders = json.leaderboard;
    const top3    = leaders.slice(0,3);
    const rest    = leaders.slice(3);

    // Podium order: 2nd left · 1st centre · 3rd right
    const podiumOrder  = [top3[1], top3[0], top3[2]].filter(Boolean);
    const rankClasses  = top3[1] ? ['rank2','rank1','rank3'] : ['rank1','rank2','rank3'];
    const crowns       = top3[1] ? ['🥈','🥇','🥉'] : ['🥇','🥈','🥉'];
    const rankLabels   = top3[1] ? ['2nd Place','1st Place','3rd Place'] : ['1st Place','2nd Place','3rd Place'];

    let html = `<div class="podium">`;
    podiumOrder.forEach((s,i)=>{
      html += `
        <div class="podium-item ${rankClasses[i]}">
          <div class="podium-card">
            <div class="podium-crown">${crowns[i]}</div>
            <div class="podium-rank">${rankLabels[i]}</div>
            <div class="podium-name">${esc(s.name)}</div>
            <div class="podium-school">${esc(s.school)}</div>
            <div class="podium-score">${esc(s.overallAvg)}</div>
            ${s.badges ? `<div class="podium-badges">${podiumBadges(s.badges)}</div>` : ''}
          </div>
        </div>`;
    });
    html += `</div>`;

    if(rest.length){
      html += `<div class="section-title">🎯 Other Top Performers</div>`;
      html += `<div class="lb-list">`;
      rest.forEach(s=>{
        html += `
          <div class="lb-row">
            <div class="lb-rank-num">#${esc(String(s.rank))}</div>
            <div class="lb-info">
              <div class="lb-name">${esc(s.name)}</div>
              <div class="lb-school">${esc(s.school)}</div>
              ${s.badges ? `<div class="lb-badges">${badgeChips(s.badges)}</div>` : ''}
            </div>
            <div class="lb-score">${esc(s.overallAvg)}</div>
          </div>`;
      });
      html += `</div>`;
    }

    html += `
      <div class="footer">
        <strong>Guided Path Noida</strong> &nbsp;&middot;&nbsp;
        <a href="https://www.guidedpathnoida.in" target="_blank">guidedpathnoida.in</a><br>
        Work hard. Your name could be here next week. 💪
      </div>`;

    wrap.innerHTML = html;
    setTimeout(sendHeight, 120);

  }catch(e){
    wrap.innerHTML = `<div class="empty">Could not load leaderboard. Please refresh.</div>`;
    sendHeight();
  }
}

/* HEIGHT REPORTING */
let lbLastH = 0;
function sendHeight(){
  const header = document.querySelector('.lb-header');
  const wrap   = document.getElementById('lbWrap');
  if(!header || !wrap) return;
  const h = header.offsetHeight + wrap.scrollHeight + 120;
  if(Math.abs(h - lbLastH) > 4){
    lbLastH = h;
    window.parent.postMessage({ type:'gpn-resize', height:h }, '*');
  }
}
window.addEventListener('load', sendHeight);
window.addEventListener('resize', sendHeight);
setTimeout(sendHeight, 500);
setTimeout(sendHeight, 1500);
new MutationObserver(function(){ setTimeout(sendHeight, 100); })
  .observe(document.body, { childList:true, subtree:true });

loadLeaderboard();
</script>
</body>
</html>
